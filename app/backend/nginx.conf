server {
    listen 80;
    server_name localhost;

    # Node.js API Gateway
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Enable CORS for API Gateway if not handled completely by Express
        # add_header 'Access-Control-Allow-Origin' '*';
    }

    # Serve static uploaded images directly via Nginx to optimize performance
    location /uploads/ {
        # IMPORTANT: DevOps needs to change this absolute path to match the real production server directory
        alias D:/XuLyVaPhanTichAnh/FinalProject/ImagePA_Final_Project/app/backend/uploads/;
        
        # Basic cache configuration
        expires 30d;
        add_header Cache-Control "public, no-transform";
        
        # Important for CORS so Frontend can read images (e.g. for canvas manipulation or simply displaying)
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
    }

    # Block public access to FastAPI if running on same server port 8000
    # Usually this isn't strictly necessary if Nginx doesn't proxy it, 
    # but added as a safety measure for reverse proxy configs.
    location /predict {
        deny all;
        return 403;
    }
}
